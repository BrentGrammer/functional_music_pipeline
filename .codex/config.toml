[mcp_servers.serena]
startup_timeout_sec = 60
command = "uv"
args = [
  "tool",
  "run",
  "--python",
  "3.13",
  "--from",
  "serena-agent@latest",
  "--prerelease=allow",
  "serena",
  "start-mcp-server",
  "--project",
  "--context=codex",
  "--open-web-dashboard=false"
]
env = { SERENA_USAGE_REPORTING = "false" }